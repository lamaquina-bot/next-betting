upstream streamlit {
    server next-dashboard:8501;
}

server {
    listen 80;
    server_name next.thefuckinggoat.cloud;

    # Redirect HTTP → HTTPS (si se usa nginx como frontend)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name next.thefuckinggoat.cloud;

    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;

    # Soporte WebSocket para Streamlit
    location / {
        proxy_pass http://streamlit;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts largos para WebSocket
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;

        # Buffering desactivado para streaming
        proxy_buffering off;
        proxy_cache off;
    }

    # Health endpoint
    location /_stcore/health {
        proxy_pass http://streamlit/_stcore/health;
        proxy_set_header Host $host;
    }

    # Streamlit usa /_stcore/endpoint para WebSocket
    location /_stcore/ {
        proxy_pass http://streamlit/_stcore/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # Static assets de Streamlit (componentes)
    location /component/ {
        proxy_pass http://streamlit/component/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    access_log /var/log/nginx/next-dashboard.access.log;
    error_log  /var/log/nginx/next-dashboard.error.log;
}
